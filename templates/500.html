{% extends "base_public.html" %}

{% block title %}500 — Server Error{% endblock %}

{% block content %}

<div class="card" style="max-width:500px; width:100%; text-align:center; padding:32px;">

  <h1 style="font-size:48px; margin-bottom:8px;">500</h1>

  <p class="cell-sub" style="margin-bottom:20px;">
    {% if error %}
      {{ error }}
    {% else %}
      An unexpected error occurred. Please try again later.
    {% endif %}
  </p>

  <div style="display:flex; gap:10px; justify-content:center;">

    <button class="btn btn-primary"
            onclick="if(document.referrer){history.back()}else{window.location='/login'}">
      Go Back
    </button>
  </div>

</div>

{% endblock %}
